# ═══════════════════════════════════════════════════════════════
# Nginx Reverse Proxy Configuration for CrystaSkill
# ═══════════════════════════════════════════════════════════════
# 1. Copy this file to your Hostinger VPS:
#    /etc/nginx/sites-available/crystaskill
# 2. Create symlink:
#    sudo ln -s /etc/nginx/sites-available/crystaskill /etc/nginx/sites-enabled/
# 3. Test config:  sudo nginx -t
# 4. Restart:      sudo systemctl restart nginx
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;  # <-- Replace with your actual domain

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    # ── Frontend (Next.js on port 9002) ──
    location / {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Backend API (Express on port 5000) ──
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Increase body size for file uploads
        client_max_body_size 10M;
    }

    # ── Static assets caching ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:9002;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /logos/ {
        proxy_pass http://127.0.0.1:9002;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Security ──
    location ~ /\.(?!well-known) {
        deny all;
    }
}

